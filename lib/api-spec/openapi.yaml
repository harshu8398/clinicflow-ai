openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: ClinicFlow AI API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: clinics
    description: Clinic management
  - name: appointments
    description: Appointment management
  - name: faqs
    description: FAQ management
  - name: chat
    description: Chat receptionist
  - name: dashboard
    description: Admin dashboard

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /clinics:
    get:
      operationId: listClinics
      tags: [clinics]
      summary: List all clinics
      responses:
        "200":
          description: List of clinics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Clinic"
    post:
      operationId: createClinic
      tags: [clinics]
      summary: Register a new clinic
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClinicInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Clinic"

  /clinics/{clinicId}:
    get:
      operationId: getClinic
      tags: [clinics]
      summary: Get clinic by ID
      parameters:
        - $ref: "#/components/parameters/ClinicIdParam"
      responses:
        "200":
          description: Clinic details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Clinic"
        "404":
          description: Not found
    put:
      operationId: updateClinic
      tags: [clinics]
      summary: Update clinic settings
      parameters:
        - $ref: "#/components/parameters/ClinicIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClinicUpdate"
      responses:
        "200":
          description: Updated clinic
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Clinic"

  /clinics/{clinicId}/auth/google:
    get:
      operationId: initiateGoogleAuth
      tags: [clinics]
      summary: Connect Google Calendar using OAuth
      parameters:
        - $ref: "#/components/parameters/ClinicIdParam"
      responses:
        "302":
          description: Redirects to Google Calendar consent screen

  /clinics/{clinicId}/auth/google/disconnect:
    post:
      operationId: disconnectGoogleAuth
      tags: [clinics]
      summary: Disconnect Google Calendar connection
      parameters:
        - $ref: "#/components/parameters/ClinicIdParam"
      responses:
        "200":
          description: Successfully disconnected
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                required: [success]

  /clinics/{clinicId}/slots:
    get:
      operationId: listAvailableSlots
      tags: [clinics]
      summary: Get available slots for a date
      parameters:
        - $ref: "#/components/parameters/ClinicIdParam"
        - name: date
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Array of slot strings
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  /clinics/{clinicId}/dashboard:
    get:
      operationId: getDashboard
      tags: [dashboard]
      summary: Get admin dashboard stats for a clinic
      parameters:
        - $ref: "#/components/parameters/ClinicIdParam"
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /clinics/{clinicId}/appointments:
    get:
      operationId: listAppointments
      tags: [appointments]
      summary: List all appointments for a clinic
      parameters:
        - $ref: "#/components/parameters/ClinicIdParam"
      responses:
        "200":
          description: List of appointments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Appointment"
    post:
      operationId: createAppointment
      tags: [appointments]
      summary: Book a new appointment
      parameters:
        - $ref: "#/components/parameters/ClinicIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppointmentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"

  /clinics/{clinicId}/blocked-slots:
    get:
      operationId: listBlockedSlots
      tags: [appointments]
      summary: List blocked slots for a clinic
      parameters:
        - $ref: "#/components/parameters/ClinicIdParam"
      responses:
        "200":
          description: List of blocked slots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BlockedSlot"
    post:
      operationId: createBlockedSlot
      tags: [appointments]
      summary: Block a specific slot
      parameters:
        - $ref: "#/components/parameters/ClinicIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BlockedSlotInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlockedSlot"

  /clinics/{clinicId}/blocked-slots/{id}:
    delete:
      operationId: deleteBlockedSlot
      tags: [appointments]
      summary: Unblock a slot
      parameters:
        - $ref: "#/components/parameters/ClinicIdParam"
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /clinics/{clinicId}/blocked-days:
    get:
      operationId: listBlockedDays
      tags: [appointments]
      summary: List blocked days for a clinic
      parameters:
        - $ref: "#/components/parameters/ClinicIdParam"
      responses:
        "200":
          description: List of blocked days
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BlockedDay"
    post:
      operationId: createBlockedDay
      tags: [appointments]
      summary: Block a specific day
      parameters:
        - $ref: "#/components/parameters/ClinicIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BlockedDayInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlockedDay"

  /clinics/{clinicId}/blocked-days/{id}:
    delete:
      operationId: deleteBlockedDay
      tags: [appointments]
      summary: Unblock a day
      parameters:
        - $ref: "#/components/parameters/ClinicIdParam"
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /clinics/{clinicId}/appointments/{appointmentId}:
    get:
      operationId: getAppointment
      tags: [appointments]
      summary: Get a specific appointment
      parameters:
        - $ref: "#/components/parameters/ClinicIdParam"
        - $ref: "#/components/parameters/AppointmentIdParam"
      responses:
        "200":
          description: Appointment details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"
        "404":
          description: Not found
    patch:
      operationId: updateAppointmentStatus
      tags: [appointments]
      summary: Update appointment status
      parameters:
        - $ref: "#/components/parameters/ClinicIdParam"
        - $ref: "#/components/parameters/AppointmentIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppointmentStatusUpdate"
      responses:
        "200":
          description: Updated appointment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"
    delete:
      operationId: deleteAppointment
      tags: [appointments]
      summary: Delete an appointment
      parameters:
        - $ref: "#/components/parameters/ClinicIdParam"
        - $ref: "#/components/parameters/AppointmentIdParam"
      responses:
        "204":
          description: Deleted

  /clinics/{clinicId}/faqs:
    get:
      operationId: listFaqs
      tags: [faqs]
      summary: List FAQs for a clinic
      parameters:
        - $ref: "#/components/parameters/ClinicIdParam"
      responses:
        "200":
          description: List of FAQs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Faq"
    post:
      operationId: createFaq
      tags: [faqs]
      summary: Add a FAQ
      parameters:
        - $ref: "#/components/parameters/ClinicIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FaqInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Faq"

  /clinics/{clinicId}/faqs/{faqId}:
    delete:
      operationId: deleteFaq
      tags: [faqs]
      summary: Delete a FAQ
      parameters:
        - $ref: "#/components/parameters/ClinicIdParam"
        - $ref: "#/components/parameters/FaqIdParam"
      responses:
        "204":
          description: Deleted

  /clinics/{clinicId}/chat/start:
    post:
      operationId: startChat
      tags: [chat]
      summary: Start a new chat session
      parameters:
        - $ref: "#/components/parameters/ClinicIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
      responses:
        "200":
          description: Initial greeting message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"

  /clinics/{clinicId}/chat/message:
    post:
      operationId: sendChatMessage
      tags: [chat]
      summary: Send a message in the chat flow
      parameters:
        - $ref: "#/components/parameters/ClinicIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatMessageInput"
      responses:
        "200":
          description: Bot reply
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"

components:
  parameters:
    ClinicIdParam:
      name: clinicId
      in: path
      required: true
      schema:
        type: integer
    AppointmentIdParam:
      name: appointmentId
      in: path
      required: true
      schema:
        type: integer
    FaqIdParam:
      name: faqId
      in: path
      required: true
      schema:
        type: integer

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    Clinic:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        address:
          type: string
        fee:
          type: string
        timings:
          type: string
        logoUrl:
          type: ["string", "null"]
        doctorSignatureUrl:
          type: ["string", "null"]
        doctorName:
          type: ["string", "null"]
        doctorQualification:
          type: ["string", "null"]
        doctorSpecialization:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        clinicName:
          type: string
        contactEmail:
          type: string
        consultationFee:
          type: string
        operatingTimings:
          type: string
        clinicLogo:
          type: ["string", "null"]
        clinicPhoneNumber:
          type: ["string", "null"]
        workingSessions:
          type: array
          items:
            type: object
            properties:
              start:
                type: string
              end:
                type: string
            required: [start, end]
        createdAt:
          type: string
        workingDays:
          type: ["string", "null"]
        openingTime:
          type: ["string", "null"]
        closingTime:
          type: ["string", "null"]
        slotDuration:
          type: ["integer", "null"]
        googleConnected:
          type: boolean
        googleConnectedEmail:
          type: ["string", "null"]
        googleCalendarId:
          type: ["string", "null"]
        googleLastSyncAt:
          type: ["string", "null"]
      required: [id, name, email, address, fee, timings, createdAt, googleConnected]

    ClinicInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
        password:
          type: string
          minLength: 6
        address:
          type: string
        fee:
          type: string
        timings:
          type: string
        logoUrl:
          type: ["string", "null"]
        doctorSignatureUrl:
          type: string
        doctorName:
          type: string
        doctorQualification:
          type: string
        doctorSpecialization:
          type: string
        phone:
          type: string
        clinicName:
          type: string
        contactEmail:
          type: string
        consultationFee:
          type: string
        operatingTimings:
          type: string
        clinicLogo:
          type: ["string", "null"]
        clinicPhoneNumber:
          type: ["string", "null"]
        workingSessions:
          type: array
          items:
            type: object
            properties:
              start:
                type: string
              end:
                type: string
            required: [start, end]
        workingDays:
          type: string
        openingTime:
          type: string
        closingTime:
          type: string
        slotDuration:
          type: integer
      required: [name, email, password, address, fee, timings]

    ClinicUpdate:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        address:
          type: string
        fee:
          type: string
        timings:
          type: string
        logoUrl:
          type: ["string", "null"]
        doctorSignatureUrl:
          type: string
        doctorName:
          type: string
        doctorQualification:
          type: string
        doctorSpecialization:
          type: string
        phone:
          type: string
        clinicName:
          type: string
        contactEmail:
          type: string
        consultationFee:
          type: string
        operatingTimings:
          type: string
        clinicLogo:
          type: ["string", "null"]
        clinicPhoneNumber:
          type: ["string", "null"]
        workingSessions:
          type: array
          items:
            type: object
            properties:
              start:
                type: string
              end:
                type: string
            required: [start, end]
        workingDays:
          type: string
        openingTime:
          type: string
        closingTime:
          type: string
        slotDuration:
          type: integer

    Appointment:
      type: object
      properties:
        id:
          type: integer
        clinicId:
          type: integer
        patientName:
          type: string
        patientPhone:
          type: string
        patientProblem:
          type: string
        appointmentDate:
          type: string
        sessionId:
          type: ["string", "null"]
        selectedTimeSlot:
          type: ["string", "null"]
        calendarEventId:
          type: ["string", "null"]
        status:
          type: string
          enum: [pending, pending_slot_selection, confirmed, booked, completed, cancelled]
        appointmentSource:
          type: string
          enum: [Online, Phone, Walk-in, Manual]
        patientAge:
          type: ["integer", "null"]
        patientGender:
          type: ["string", "null"]
        visitType:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        doctorId:
          type: ["integer", "null"]
        createdAt:
          type: string
      required: [id, clinicId, patientName, patientPhone, patientProblem, appointmentDate, status, createdAt]

    AppointmentInput:
      type: object
      properties:
        patientName:
          type: string
          minLength: 1
        patientPhone:
          type: string
          minLength: 1
        patientProblem:
          type: string
          minLength: 1
        appointmentDate:
          type: string
          minLength: 1
        selectedTimeSlot:
          type: ["string", "null"]
        appointmentSource:
          type: string
          enum: [Online, Phone, Walk-in, Manual]
        patientAge:
          type: ["integer", "null"]
        patientGender:
          type: ["string", "null"]
        visitType:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        doctorId:
          type: ["integer", "null"]
      required: [patientName, patientPhone, patientProblem, appointmentDate]

    AppointmentStatusUpdate:
      type: object
      properties:
        status:
          type: string
          enum: [pending, pending_slot_selection, confirmed, booked, completed, cancelled]
        appointmentDate:
          type: string
        selectedTimeSlot:
          type: string
        appointmentSource:
          type: string
          enum: [Online, Phone, Walk-in, Manual]
        patientAge:
          type: ["integer", "null"]
        patientGender:
          type: ["string", "null"]
        visitType:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        doctorId:
          type: ["integer", "null"]
      required: [status]

    Faq:
      type: object
      properties:
        id:
          type: integer
        clinicId:
          type: integer
        question:
          type: string
        answer:
          type: string
        createdAt:
          type: string
      required: [id, clinicId, question, answer, createdAt]

    FaqInput:
      type: object
      properties:
        question:
          type: string
          minLength: 1
        answer:
          type: string
          minLength: 1
      required: [question, answer]

    DashboardStats:
      type: object
      properties:
        totalAppointments:
          type: integer
        todayAppointments:
          type: integer
        pendingCount:
          type: integer
        confirmedCount:
          type: integer
        completedCount:
          type: integer
        todayOnlineAppointments:
          type: integer
        todayManualAppointments:
          type: integer
        todayBlockedSlots:
          type: integer
        todayCompletedAppointments:
          type: integer
        todayCancelledAppointments:
          type: integer
        recentAppointments:
          type: array
          items:
            $ref: "#/components/schemas/Appointment"
      required: [totalAppointments, todayAppointments, pendingCount, confirmedCount, completedCount, todayOnlineAppointments, todayManualAppointments, todayBlockedSlots, todayCompletedAppointments, todayCancelledAppointments, recentAppointments]

    ChatMessageInput:
      type: object
      properties:
        sessionId:
          type: string
        step:
          type: string
        message:
          type: string
          minLength: 1
        context:
          type: object
          properties:
            patientName:
              type: ["string", "null"]
            patientPhone:
              type: ["string", "null"]
            patientProblem:
              type: ["string", "null"]
            appointmentDate:
              type: ["string", "null"]
            selectedTimeSlot:
              type: ["string", "null"]
      required: [sessionId, step, message]

    ChatResponse:
      type: object
      properties:
        sessionId:
          type: string
        step:
          type: string
        botMessage:
          type: string
        isComplete:
          type: boolean
        appointment:
          $ref: "#/components/schemas/Appointment"
      required: [sessionId, step, botMessage, isComplete]

    BlockedSlot:
      type: object
      properties:
        id:
          type: integer
        clinicId:
          type: integer
        doctorId:
          type: ["integer", "null"]
        date:
          type: string
        startTime:
          type: string
        endTime:
          type: string
        reason:
          type: ["string", "null"]
        createdAt:
          type: string
      required: [id, clinicId, date, startTime, endTime, createdAt]

    BlockedSlotInput:
      type: object
      properties:
        doctorId:
          type: ["integer", "null"]
        date:
          type: string
          minLength: 1
        startTime:
          type: string
          minLength: 1
        endTime:
          type: string
          minLength: 1
        reason:
          type: ["string", "null"]
      required: [date, startTime, endTime]

    BlockedDay:
      type: object
      properties:
        id:
          type: integer
        clinicId:
          type: integer
        doctorId:
          type: ["integer", "null"]
        date:
          type: string
        reason:
          type: ["string", "null"]
        createdAt:
          type: string
      required: [id, clinicId, date, createdAt]

    BlockedDayInput:
      type: object
      properties:
        doctorId:
          type: ["integer", "null"]
        date:
          type: string
          minLength: 1
        reason:
          type: ["string", "null"]
      required: [date]
